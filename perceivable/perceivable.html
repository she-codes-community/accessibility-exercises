<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Perceivable Practice</title>
  <link rel="stylesheet" href="perceivable.css">
</head>

<body>

  <h1>Join our newsletter</h1>

  <p>Get updates and special offers by email</p>

  <!-- תמונה בלי alt -->
  <img 
    src="https://images.unsplash.com/photo-1515378791036-0648a3ef77b2" 
    width="300"
  >

  <form id="form">
    
    <label>Email</label><br>
    <input id="email" type="email"><br>

    <button class="btn" type="button" onclick="showError()">
      Subscribe
    </button>

  </form>

  <script>
    function showError() {
      const input = document.getElementById("email");
      input.classList.add("error-input");
    }
  </script>

</body>
</html>
