<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workshop Signup</title>
  <link rel="stylesheet" href="final-solution.css">
</head>

<body>

  <main class="page">

    <header class="hero">
      <h1>Front-End Workshop</h1>
      <p class="subtitle">Learn practical skills for real projects</p>

      <img 
        src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3"
        alt="People learning and working together on laptops"
        class="hero-image"
      >
    </header>

    <section class="content">
      <h2>Join us</h2>

      <p class="instructions">
        Enter your details to register for the workshop
      </p>

      <form>
        <label for="name">Full name</label>
        <input id="name" type="text" placeholder="Your name">

        <label for="email">Email address</label>
        <input id="email" type="text" placeholder="example@mail.com">

        <p id="email-error" class="error">
          Please enter a valid email address
        </p>

        <button type="button" onclick="validateEmail()">
          Register
        </button>
      </form>

      <p>
        Want more information?
        <a href="details.html">View workshop details</a>
      </p>
    </section>

  </main>

  <script>
    function validateEmail() {
      const input = document.getElementById("email");
      const error = document.getElementById("email-error");

      if (!input.value.includes("@")) {
        error.style.display = "block";
      } else {
        error.style.display = "none";
      }
    }
  </script>

</body>
</html>
