<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workshop Signup</title>
  <link rel="stylesheet" href="final.css">
</head>

<body>
  <div class="page">
    <div class="hero">
      <div class="title">Front-End Workshop</div>
      <p class="subtitle">Learn practical skills for real projects</p>

      <img 
        src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3"
        class="hero-image"
      >
    </div>

    <div class="content">
      <div class="section-title">Join us</div>

      <p class="instructions">Enter details</p>

      <form>
        <input id="name" type="text" placeholder="Name">

        <input id="email" type="text" placeholder="Email">

        <p id="email-error" class="error">Error</p>

        <div class="fake-button" onclick="showError()">
          Send
        </div>
      </form>

      <p>
        Want more information?
        <a href="details.html">Click here</a>
      </p>
    </div>
  </div>

  <script>
    function showError() {
      const error = document.getElementById("email-error");
      error.style.display = "block";
    }
  </script>
</body>
</html>
